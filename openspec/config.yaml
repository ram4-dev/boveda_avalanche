  batch_scope: Batch 4 — Institutional Dashboard
  api_contract: docs/demo/openapi.yaml
  demo_flow: docs/demo/demo-flow.md
  states_events: docs/demo/states-events.md
  seed_data: data/demo/loans.seed.json
  backend_runbook: docs/demo/backend-runbook.md
  design_system: DESIGN.md
  backend_readiness: openspec/changes/batch-2-backend-risk-attestations/verify-report.md
  borrower_widget_readiness: openspec/changes/batch-3-borrower-widget/verify-report.md
  canonical_endpoint_policy: >-
    docs/demo/openapi.yaml is canonical when plan prose differs. Batch 4 should
    use the Batch 2 local API paths exactly, especially GET /dashboard/summary,
    GET /events, GET /loans, and GET /loans/{loanId}; fixtures are allowed only
    where aggregate dashboard data is missing or insufficient for demo clarity.
  batch_2_status: >-
    Batch 2 API is implemented and verified on main per the verify report.
    Treat it as the local API source for Batch 4 dashboard reads instead of
    rebuilding backend behavior in frontend code.
  batch_3_status: >-
    Batch 3 borrower widget is committed at the Batch 4 branch base and provides
    the Vite/React/TypeScript frontend baseline, API client patterns, UI tokens,
    and app composition conventions for Batch 4.

sdd:
  strict_tdd: true
  execution_mode: interactive
  artifact_store:
    primary: openspec
    memory_requested: engram
    note: >-
      OpenSpec files in the repository are the authoritative artifacts for this
      init. Engram tools were not exposed to this subagent runtime, so memory
      save-back could not be performed here.
  change: batch-4-institutional-dashboard
  scope:
    include:
      - B4.1 institutional dashboard layout with clear cards and portfolio table
      - B4.2 portfolio widgets for capital utilized, active loans, active vaults, and delinquency/default exposure
      - B4.3 LTV/risk widget with average LTV, margin-call loans, and exposure by collateral asset
      - B4.4 audit trail listing canonical events with tx hashes or links when available
      - B4.5 loan detail view showing loanId, borrower wallet, collateral, payments, status, and receipt/liquidation context
      - B4.6 dual demo mode toggle between institutional traditional case and crypto-native case
      - Use Batch 2 endpoints first; use fixtures only for missing aggregate data
      - Communicate institutional guarantees: verifiable collateral, LTV, attested payments, and programmatic liquidation
    exclude:
      - Real KYC, fiat rails, payment processor, accounting reconciliation, or off-ramp
      - Production-grade wallet/session management, custodial flows, private keys, or secrets
      - Production oracle, DEX liquidation, or real Wavy Node integration
      - Backend schema or endpoint rewrites unless later planning proves a minimal contract gap
      - Reimplementing Batch 2 dashboard/event/loan behavior in frontend code
      - Implementing Batch 4 during init
  acceptance: >-
    The dashboard communicates guarantees to an institutional funder: collateral
    is verifiable, portfolio LTV/risk is understandable, payments are attested,
    audit events are traceable, and liquidation is programmatic. It may use
    static fixtures only where aggregate data is missing, while preserving the
    canonical Batch 2 API contract.
  review:
    pr_strategy: auto-forecast
    changed_lines_budget: 400
    guard: >-
      Pause before sdd-apply if task forecast exceeds the changed-lines budget,
      introduces broad backend changes, or requires a chained work-unit decision.
  phases:
    order:
      - init
      - explore
      - proposal
      - spec
      - design
      - tasks
      - apply
      - verify
      - archive
    rules:
      init: Capture Batch 4 project context, source-of-truth docs, Batch 2/3 readiness, testing plan, worktree/branch, UI standards, and skill registry status.
      explore: Inspect OpenAPI dashboard/event/loan schemas, seed data, existing API client/types, Batch 3 App layout seams, current tests, and design tokens before proposing dashboard slices.
      proposal: Define complete Batch 4 scope, acceptance criteria, non-goals, dependencies, endpoint usage, fixture boundaries, and dual-demo behavior.
      spec: Write testable Given/When/Then requirements for institutional dashboard layout, portfolio metrics, LTV/risk, audit trail, loan detail, and demo-mode toggle using OpenAPI and Batch 4 plan as canonical inputs.
      design: Document React component boundaries, API client additions, dashboard state model, fixture fallback model, loan-detail interaction, and visual layout standards.
      tasks: Break work into reviewable strict-TDD slices, forecast changed lines, and decide whether to chain work units before apply.
      apply: >-
        STRICT TDD MODE IS ACTIVE. Test runner: npm test -- --run. Follow RED,
        GREEN, TRIANGULATE, REFACTOR and record evidence. Preserve existing
        backend and Batch 3 frontend tests while adding focused dashboard tests
        before production UI code.
      verify: Run configured tests plus typecheck/build/lint; validate accepted Batch 4 scenarios against the local Batch 2 API contract, fixtures policy, and UI requirements.
      archive: Preserve final SDD decisions, artifacts, run commands, review boundary decisions, and remaining integration gaps.


testing:
  strict_tdd: true
  detected_at: "2026-05-16"
  detection:
    package_manifest: package.json
    lockfile: package-lock.json
    test_config: vitest.config.ts
    existing_runnable_command: npm test -- --run
    vitest_projects:
      api:
        environment: node
        include: tests/**/*.test.ts
      web:
        environment: jsdom
        include: web/src/**/*.test.{ts,tsx}
        setup_files:
          - web/src/test/setup.ts
    foundry_config: foundry.toml
    frontend_scaffold: detected
    backend_api: detected
    contracts: detected
  commands:
    install: npm install --registry=https://registry.npmjs.org
    dev_api: npm run dev
    dev_web: npm run dev:web
    primary_test: npm test -- --run
    targeted_test: npm test -- --run <test-file>
    typecheck: npm run typecheck
    build: npm run build
    lint: npm run lint
    forge_build_if_contracts_touched: forge build
    forge_test_if_contracts_touched: forge test
    full_validation:
      - npm test -- --run
      - npm run typecheck
      - npm run build
      - npm run lint
      - forge build # if contract artifacts, Solidity, or deployment scripts are touched
      - forge test # if contract artifacts, Solidity, or deployment scripts are touched
  tdd_requirement: >-
    Batch 5 apply must start each implementation slice with failing tests before
    production changes. Record RED, GREEN, TRIANGULATE, and REFACTOR evidence in
    openspec/changes/batch-5-e2e-integration/apply-progress.md. Existing API,
    borrower, dashboard, and contract confidence must remain green.

conventions:
  api_identifiers: English identifiers and enum values per docs/demo/openapi.yaml
  generated_artifacts_language: English by default unless extending Spanish narrative docs
  human_docs_language: Spanish is acceptable for narrative docs already in repo
  money_and_liquidation: Liquidation proceeds must be reported in USDC
  status_machine: Follow docs/demo/states-events.md transitions
  mode_policy: >-
    Normal / is real Fuji-backed API mode. /demo is mock/demo mode. UI and API
    evidence must make the active mode visible and must not conflate simulated
    hashes with live chain transactions.
  config_policy: >-
    Commit only safe examples/placeholders for runtime configuration. Public
    contract addresses and ABI references may be committed. Private keys, RPC
    credentials, tokens, .env values, and secret material must never be read,
    logged, or committed.
  fixture_policy: >-
    Mock/demo fixtures remain valid for /demo and fallback paths. Real mode
    should use Fuji-backed adapter evidence where available and degrade visibly
    when live infrastructure is unavailable.
  wallet_policy: >-
    Never read or expose private keys, seed phrases, wallet secrets, .env files,
    credentials, or secret manager outputs. Frontend wallet integration must use
    injected provider boundaries only.
  ui_design:
    source: DESIGN.md plus existing web/src/styles/tokens.css and web/src/styles/app.css
    guidance: >-
      Keep the interface polished, compact, evidence-forward, and honest about
      data mode. Avoid raw JSON dumps, vague gradients, oversized empty cards,
      and unlabeled simulated state.
  secrets_policy: >-
    Do not read or expose .env files, private keys, credentials, tokens,
    passwords, seed phrases, or secret manager outputs. Use examples/placeholders
    only when documenting configuration.


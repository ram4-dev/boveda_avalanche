project:
  name: boveda_avalanche
  repository: /Users/rcarnicer/Desktop/hackathon_avalance-batch-5-e2e-integration
  branch: feature/batch-5-e2e-integration
  worktree_policy: separate worktree with own branch for Batch 5
  type: hackathon-demo-fullstack
  description: >-
    Bóveda Avalanche hackathon demo. Batches 1-4 produced Solidity contracts,
    a mock-first Fastify API, a React borrower widget, and an institutional
    dashboard. Batch 5 integrates those pieces into a repeatable end-to-end demo
    with honest mock vs Fuji mode labeling, visible tx/event evidence, and a
    reset/runbook path.
  stack:
    frontend:
      bundler: Vite
      ui: React
      language: TypeScript
      source: web/src/
      status: Batch 3 borrower widget and Batch 4 institutional dashboard are present.
      routing_decision: >-
        Normal / should represent the real Fuji-backed API mode. /demo should
        represent labeled mock/demo data mode. Mock mode must never be presented
        as live chain evidence.
      wallet: >-
        Injected wallet support exists via web/src/wallet. No private keys,
        seed phrases, or wallet secrets may be read, committed, or exposed.
    backend:
      runtime: Node.js
      language: TypeScript
      http_framework: Fastify
      source: src/
      status: Batch 2 API is implemented with deterministic in-memory demo state.
      integration_boundary: >-
        src/adapters/web3.ts defines the Web3Adapter seam. Mock web3 is the
        current default and should remain available for /demo and fallback mode.
        Batch 5 may add Fuji adapter/config wiring behind the same interface.
      canonical_api: docs/demo/openapi.yaml
    contracts:
      framework: Foundry
      source:
        - contracts/
        - script/
        - test/
      artifacts:
        - out/**/*.json
        - broadcast/Deploy.s.sol/43113/run-latest.json
      status: >-
        Batch 1 contracts, deploy script, compiled ABI artifacts, tests, and a
        Fuji broadcast artifact are present. README_CONTRACTS.md appears stale
        where it still marks Fuji deployment as pending.


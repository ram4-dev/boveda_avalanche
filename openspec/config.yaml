testing:
  strict_tdd: true
  detected_at: "2026-05-16"
  detection:
    package_manifest: package.json
    lockfile: package-lock.json
    test_config: vitest.config.ts
    existing_runnable_command: npm test -- --run
    vitest_projects:
      api:
        environment: node
        include: tests/**/*.test.ts
      web:
        environment: jsdom
        include: web/src/**/*.test.{ts,tsx}
        setup_files:
          - web/src/test/setup.ts
    frontend_scaffold: detected
  commands:
    install: npm install --registry=https://registry.npmjs.org
    dev_api: npm run dev
    dev_web: npm run dev:web
    primary_test: npm test -- --run
    targeted_test: npm test -- --run <test-file>
    lint: npm run lint
    typecheck: npm run typecheck
    build: npm run build
  tdd_requirement: >-
    Batch 4 apply must start each implementation slice with failing API-client,
    state, component, or integration tests before production code. Record RED,
    GREEN, TRIANGULATE, and REFACTOR evidence in the Batch 4 apply-progress
    artifact when implementation begins.

conventions:
  api_identifiers: English identifiers and enum values per docs/demo/openapi.yaml
  human_docs_language: Spanish is acceptable for narrative docs already in repo
  generated_artifacts_language: English by default unless extending Spanish narrative docs
  money_and_liquidation: Liquidation proceeds must be reported in USDC
  status_machine: Follow docs/demo/states-events.md transitions
  fixture_policy: >-
    Use Batch 2 API responses as the default source. Use data/demo/loans.seed.json
    or Batch 4-specific frontend fixtures only for missing aggregate/dual-demo
    data and label fixture-only assumptions in design/tasks.
  wallet_policy: >-
    Never read or expose private keys, seed phrases, wallet secrets, .env files,
    credentials, or secret manager outputs. Institutional dashboard work should
    not require wallet secrets.
  ui_design:
    source: DESIGN.md plus existing web/src/styles/tokens.css and web/src/styles/app.css
    guidance: >-
      Build a quiet, polished institutional data-product interface with useful
      first-screen portfolio signal, compact headings, clear tables, status
      labels, and traceable event evidence. Avoid generic gradients, oversized
      empty cards, decorative blobs, raw JSON dumps, and floating/overlapping
      panels.
  secrets_policy: >-
    Do not read or expose .env files, private keys, credentials, tokens,
    passwords, seed phrases, or secret manager outputs. Commit only safe
    examples/templates.


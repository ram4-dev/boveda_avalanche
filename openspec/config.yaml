sdd:
  strict_tdd: true
  execution_mode: interactive
  artifact_store:
    primary: openspec
    memory_requested: engram
    note: >-
      OpenSpec files in the repository are authoritative for this run. Engram
      memory tools were not exposed to this subagent runtime, so save-back could
      not be performed here.
  change: batch-5-e2e-integration
  scope:
    include:
      - B5.1 configure frontend/backend with deployed contract addresses and ABI references using safe examples/placeholders only
      - B5.2 prove complete origination flow from loan creation through collateral deposit, activation, and receipt evidence
      - B5.3 prove payment attestation flow with visible hash/tx/event evidence reflected in UI and dashboard
      - B5.4 prove liquidation path with LTV/default trigger, liquidation result, USDC proceeds, and dashboard/event visibility
      - B5.5 prepare reset script plus runbook so the demo can run twice consecutively without improvised manual recovery
      - B5.6 freeze scope after integration; allow only demo-critical fixes and evidence/reporting gaps
      - Implement honest runtime mode separation: normal / uses real Fuji-backed API mode and /demo uses mock data/mode
      - Preserve mock-first fallback for hackathon safety, but label mock mode clearly as simulated
      - Use broadcast artifact addresses as contract-authoritative
    exclude:
      - Reading, printing, committing, or deriving private keys, .env values, tokens, credentials, seed phrases, or secret-manager outputs
      - Production custody, KYC, fiat rail, accounting, oracle, keeper, or DEX automation
      - Broad contract redesign or public HTTP API rewrites unrelated to Batch 5 evidence
      - Hard dependency on live Fuji availability for baseline /demo success
      - Claiming mock tx hashes or locally simulated events are live chain evidence
      - Implementing Batch 6 pitch materials, Batch 7 oracle/keeper/top-up work, or Batch 8 real-source dashboard scope during Batch 5 init
  acceptance: >-
    The complete demo can be run twice consecutively with visible transaction,
    event, receipt/payment/liquidation evidence and links where available. Normal
    / is wired for real Fuji-backed API mode; /demo is wired for labeled mock
    mode. Mock evidence is labeled honestly. Reset is provided by script plus
    runbook. No secrets are read or exposed.
  review:
    pr_strategy: auto-forecast
    changed_lines_budget: 400
    guard: >-
      Pause before sdd-apply if task forecast exceeds the changed-lines budget,
      requires broad backend and frontend rewrites in one slice, touches contract
      semantics, or requires a chained work-unit decision.
  phases:
    order:
      - init
      - explore
      - proposal
      - spec
      - design
      - tasks
      - apply
      - verify
      - archive
    rules:
      init: >-
        Refresh project context for Batch 5, preserve prior change artifacts,
        capture source-of-truth docs, strict-TDD runner details, worktree/branch,
        route/mode decisions, Fuji address source, validation commands, skill
        registry status, and secrets guardrails.
      explore: >-
        Inspect OpenAPI endpoints, existing API adapters/routes, borrower journey,
        dashboard evidence surfaces, demo controls/reset seams, contract ABIs,
        broadcast artifact structure, current tests, and docs before proposing
        Batch 5 implementation slices. Do not read .env or secret material.
      proposal: >-
        Define complete Batch 5 scope, non-goals, acceptance criteria,
        dependencies, runtime mode policy, address/config policy, reset approach,
        evidence definition, and fallback behavior.
      spec: >-
        Write testable Given/When/Then requirements for mock-vs-Fuji mode,
        config/address loading, origination, payment attestation, liquidation,
        dashboard/event evidence, reset/repeatability, and honest labeling.
      design: >-
        Document route/mode architecture (/ real Fuji-backed mode, /demo mock
        mode), backend adapter composition, config loader, ABI/address handling,
        UI evidence surfaces, reset script/runbook, and failure/fallback behavior.
      tasks: >-
        Break implementation into strict-TDD reviewable slices, forecast changed
        lines, identify contract-touch risk, and decide whether to chain work
        units before apply.
      apply: >-
        STRICT TDD MODE IS ACTIVE. Test runner: npm test -- --run. Follow RED,
        GREEN, TRIANGULATE, REFACTOR and record evidence. Preserve existing API,
        borrower, dashboard, and contract tests. If contract artifacts or Solidity
        are touched, also run forge build and forge test.
      verify: >-
        Run npm test -- --run, npm run typecheck, npm run build, npm run lint.
        If contract artifacts or Solidity were touched, also run forge build and
        forge test. Verify the demo can run twice with reset evidence, route/mode
        labels, and no secret exposure.
      archive: >-
        Preserve final Batch 5 decisions, artifacts, evidence, commands, reset
        runbook, review-boundary decisions, and remaining live-chain gaps.

